name: Build and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build and test
        run: mvn --batch-mode verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: mvn --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger downstream CI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          for repo in work qhorus; do
            echo "Triggering $repo CI..."
            gh api repos/casehubio/$repo/dispatches \
              -f event_type=upstream-published \
              -f client_payload[source]="ledger" 2>/dev/null && echo "  ✅ $repo triggered" || echo "  ⚠️  $repo trigger failed (may not have listener yet)"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
