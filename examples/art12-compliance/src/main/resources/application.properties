# ===================================================
# Quarkus Ledger — EU AI Act Art.12 Compliance Example
# ===================================================

quarkus.application.name=ledger-example-art12-compliance

# Datasource — H2 in-memory for dev/test
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:art12db;DB_CLOSE_DELAY=-1

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none

# Flyway — picks up migrations from both this app and quarkus-ledger JAR
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# quarkus-ledger — compliance features enabled
quarkus.ledger.enabled=true
quarkus.ledger.hash-chain.enabled=true
quarkus.ledger.retention.enabled=false

# Activate DecisionEntryRepository (extends @Alternative JpaLedgerEntryRepository)
quarkus.arc.selected-alternatives=io.quarkiverse.ledger.examples.art12.ledger.DecisionEntryRepository

# Logging
quarkus.log.category."io.quarkiverse.ledger".level=DEBUG
