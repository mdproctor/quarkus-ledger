# ===================================================
# Quarkus Ledger — Order Processing Example
# ===================================================

quarkus.application.name=ledger-example-order-processing

# Datasource — H2 in-memory for dev/test
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:orderdb2;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none

# Flyway — picks up migrations from both this app and quarkus-ledger JAR
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# quarkus-ledger — all features enabled for the example
quarkus.ledger.enabled=true
quarkus.ledger.hash-chain.enabled=true
quarkus.ledger.decision-context.enabled=true
quarkus.ledger.evidence.enabled=true
quarkus.ledger.attestations.enabled=true
quarkus.ledger.trust-score.enabled=false

# Sample data — seeded on startup in dev/test; disable in prod
app.sample-data.enabled=true
%prod.app.sample-data.enabled=false

# Dev UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Logging — show ledger activity
quarkus.log.category."io.quarkiverse.ledger".level=DEBUG
