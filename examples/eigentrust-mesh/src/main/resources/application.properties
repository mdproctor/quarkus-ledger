quarkus.application.name=ledger-example-eigentrust-mesh

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:eigentrustexampledb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

quarkus.hibernate-orm.database.generation=none

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

quarkus.ledger.enabled=true
quarkus.ledger.hash-chain.enabled=true
quarkus.ledger.attestations.enabled=true
quarkus.ledger.trust-score.enabled=true
quarkus.ledger.trust-score.eigentrust.enabled=true
quarkus.ledger.trust-score.eigentrust.alpha=0.15

quarkus.arc.selected-alternatives=io.quarkiverse.ledger.runtime.repository.jpa.JpaLedgerEntryRepository

quarkus.scheduler.enabled=false

quarkus.log.category."io.quarkiverse.ledger".level=DEBUG
