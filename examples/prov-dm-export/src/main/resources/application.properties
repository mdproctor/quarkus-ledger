# ===================================================
# Quarkus Ledger — PROV-DM Export Example
# ===================================================

quarkus.application.name=ledger-example-prov-dm-export

# Datasource — H2 in-memory for dev/test
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:provdb;DB_CLOSE_DELAY=-1

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none

# Flyway — picks up migrations from both this app and quarkus-ledger JAR
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# quarkus-ledger — PROV-DM export enabled, hash chain off for simplicity
quarkus.ledger.enabled=true
quarkus.ledger.hash-chain.enabled=false
quarkus.ledger.retention.enabled=false

# Activate ProvAuditEntryRepository (extends @Alternative JpaLedgerEntryRepository)
quarkus.arc.selected-alternatives=io.quarkiverse.ledger.example.prov.ProvAuditEntryRepository

# HTTP — use 0 (random port) in test so we don't clash with other running apps
%test.quarkus.http.test-port=0

# Logging
quarkus.log.category."io.quarkiverse.ledger".level=DEBUG
