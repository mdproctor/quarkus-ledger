quarkus.application.name=ledger-example-privacy-pseudonymisation

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:privacyexampledb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

quarkus.hibernate-orm.database.generation=none

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

casehub.ledger.enabled=true
casehub.ledger.hash-chain.enabled=true
casehub.ledger.decision-context.enabled=true
casehub.ledger.attestations.enabled=true
casehub.ledger.identity.tokenisation.enabled=true

quarkus.arc.selected-alternatives=io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository

quarkus.scheduler.enabled=false
quarkus.log.category."io.casehub.ledger".level=DEBUG
