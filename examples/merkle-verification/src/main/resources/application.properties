# ===================================================
# Quarkus Ledger — Merkle Verification Example
# ===================================================

quarkus.application.name=ledger-example-merkle-verification

# Datasource — H2 in-memory for dev/test
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:merkledb;DB_CLOSE_DELAY=-1

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none

# Flyway — picks up migrations from both this app and casehub-ledger JAR
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# casehub-ledger — Merkle enabled
casehub.ledger.enabled=true
casehub.ledger.hash-chain.enabled=true
casehub.ledger.retention.enabled=false

# Activate AuditEntryRepository (extends @Alternative JpaLedgerEntryRepository)
quarkus.arc.selected-alternatives=io.casehub.ledger.example.merkle.AuditEntryRepository

# HTTP — use 0 (random port) in test so we don't clash with other running apps
%test.quarkus.http.test-port=0

# Logging
quarkus.log.category."io.casehub.ledger".level=DEBUG
